server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /snipit {
        return 301 /snipit/;
    }

    location /snipit/ {
        try_files $uri /snipit/index.html;
    }

    # Optional: cache static files aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}
